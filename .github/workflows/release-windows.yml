name: Release Windows Binary

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  BOX_URL: https://github.com/box-project/box/releases/latest/download/box.phar
  PHP_MICRO_URL: https://dl.static-php.dev/static-php-cli/windows/spc-max/php-8.5.5-micro-win.zip

jobs:
  quality:
    uses: ./.github/workflows/quality.yml

  # Box на Windows нестабилен (блокировка temp-директорий). PHAR собираем на Linux.
  build-phar:
    name: Build PHAR
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Bake version from git tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "Baking version=${version}"
          sed -i "s/@package_version@/${version}/g" src/Console/Application.php
          grep "VERSION = " src/Console/Application.php

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          tools: composer:v2
          coverage: none

      - name: Install production dependencies
        run: composer install --no-dev --no-interaction --optimize-autoloader --classmap-authoritative

      - name: Bundle application
        run: |
          mkdir -p build
          curl -fsSL -o box.phar "${BOX_URL}"
          php -d phar.readonly=0 box.phar compile --no-interaction

      - name: Smoke PHAR -V matches tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          expected="laravel-ready ${version}"
          actual="$(php build/laravel-ready.phar -V | tr -d '\r' | head -n 1)"
          echo "expected=${expected}"
          echo "actual=${actual}"
          test "$actual" = "$expected"

      - name: Upload PHAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: laravel-ready-phar
          path: build/laravel-ready.phar
          retention-days: 1

  release-windows:
    name: Build laravel-ready.exe
    runs-on: windows-latest
    needs: build-phar

    steps:
      - name: Download PHAR artifact
        uses: actions/download-artifact@v8
        with:
          name: laravel-ready-phar
          path: build

      - name: Download micro.sfx
        shell: bash
        run: |
          curl -fsSL -o micro.zip "${PHP_MICRO_URL}"
          unzip -j micro.zip micro.sfx -d build

      - name: Assemble static binary
        shell: cmd
        run: copy /b build\micro.sfx + build\laravel-ready.phar build\laravel-ready.exe

      - name: Smoke test binary
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          expected="laravel-ready ${version}"
          actual="$(./build/laravel-ready.exe -V | tr -d '\r' | head -n 1)"
          echo "expected=${expected}"
          echo "actual=${actual}"
          test "$actual" = "$expected"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/laravel-ready.exe
          generate_release_notes: true
